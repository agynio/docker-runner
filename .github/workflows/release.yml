name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/agynio/docker-runner
  DOCKER_PLATFORMS: linux/amd64,linux/arm64
  CHART_REGISTRY: oci://ghcr.io/agynio/charts

jobs:
  image-release:
    name: Build and publish docker image (release)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push docker-runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ env.DOCKER_PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-runner
          cache-to: type=gha,scope=docker-runner,mode=max

      - name: Verify multi-arch manifest
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          INSPECT="$(docker buildx imagetools inspect "$IMAGE_NAME:$TAG" --raw)"
          FOUND="$(echo "$INSPECT" | jq -r '[.manifests[].platform.architecture] | sort | join(",")')"
          MISSING=()
          for ARCH in amd64 arm64; do
            if ! echo "$FOUND" | grep -q "$ARCH"; then
              MISSING+=("linux/$ARCH")
            fi
          done
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing architectures in $IMAGE_NAME:$TAG: ${MISSING[*]}"
            exit 1
          fi
          echo "Manifest $IMAGE_NAME:$TAG includes linux/amd64 and linux/arm64"

  chart:
    name: Package and publish Helm chart
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: image-release
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract release version
        run: |
          if [[ "${GITHUB_REF_NAME}" != v*.*.* ]]; then
            echo "Tag must follow v*.*.*" >&2
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          echo "RELEASE_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username "${{ github.actor }}" --password-stdin

      - name: Build chart dependencies
        run: helm dependency build charts/docker-runner

      - name: Lint chart
        run: helm lint charts/docker-runner

      - name: Package chart
        run: |
          mkdir -p dist
          helm package charts/docker-runner \
            --destination dist \
            --version "$RELEASE_VERSION" \
            --app-version "$RELEASE_VERSION"

      - name: Push chart
        run: helm push "dist/docker-runner-${RELEASE_VERSION}.tgz" "$CHART_REGISTRY"
