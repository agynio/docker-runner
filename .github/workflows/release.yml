name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  DOCKER_PLATFORMS: linux/amd64,linux/arm64
  CHART_REGISTRY: oci://ghcr.io/agynio/charts

jobs:
  image:
    name: Build and publish docker image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract release version
        run: |
          if [[ "${GITHUB_REF_NAME}" != v*.*.* ]]; then
            echo "Tag must follow v*.*.*" >&2
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          echo "RELEASE_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push docker-runner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ env.DOCKER_PLATFORMS }}
          push: true
          tags: |
            ghcr.io/agynio/docker-runner:${{ env.RELEASE_VERSION }}
            ghcr.io/agynio/docker-runner:latest

  chart:
    name: Package and publish Helm chart
    runs-on: ubuntu-latest
    needs: image
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract release version
        run: |
          if [[ "${GITHUB_REF_NAME}" != v*.*.* ]]; then
            echo "Tag must follow v*.*.*" >&2
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          echo "RELEASE_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username "${{ github.actor }}" --password-stdin

      - name: Build chart dependencies
        run: helm dependency build charts/docker-runner

      - name: Lint chart
        run: helm lint charts/docker-runner

      - name: Package chart
        run: |
          mkdir -p dist
          helm package charts/docker-runner \
            --destination dist \
            --version "$RELEASE_VERSION" \
            --app-version "$RELEASE_VERSION"

      - name: Push chart
        run: helm push "dist/docker-runner-${RELEASE_VERSION}.tgz" "$CHART_REGISTRY"
